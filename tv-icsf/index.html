  <!-- Load Static Channels Script -->
  <script src="channels.js"></script>

  <!-- Client side logic -->
  <script>
    // State Variables
    const aynaU = "78be6644-0a65-48ec-81a4-089ac65a2619";
    const aynaE = "1779283759";

    let selectedChannel = null;
    let searchQuery = "";
    let selectedCategory = "All";
    let visibleCount = 120;
    let sortedChannels = [];
    let filteredChannels = [];
    let hlsInstance = null;
    let channelStatus = {};

    // Get DOM Elements
    const videoElement = document.getElementById("main-video");
    const playButton = document.getElementById("play-button");
    const playIcon = document.getElementById("play-icon");
    const prevButton = document.getElementById("prev-button");
    const nextButton = document.getElementById("next-button");
    const reloadButton = document.getElementById("reload-button");
    const fullscreenButton = document.getElementById("fullscreen-button");
    const searchInput = document.getElementById("search-input");
    const clearSearch = document.getElementById("clear-search");
    const playerLoading = document.getElementById("player-loading");
    const playerError = document.getElementById("player-error");
    const errorChannelName = document.getElementById("error-channel-name");
    const errorChannelDesc = document.getElementById("error-channel-desc");
    const retryButton = document.getElementById("retry-button");
    const playerActiveTitle = document.getElementById("player-active-title");
    const channelsGrid = document.getElementById("channels-grid");
    const noChannels = document.getElementById("no-channels");
    const channelCountText = document.getElementById("channel-count");
    const paginationPanel = document.getElementById("pagination-panel");
    const btnShowMore = document.getElementById("btn-show-more");
    const categoryTabs = document.querySelectorAll(".category-tab");
    const footerYear = document.getElementById("footer-year");

    // Set Footer Year
    footerYear.textContent = new Date().getFullYear();

    // Init Channel Status Cache
    function initStatusCache() {
      try {
        const saved = localStorage.getItem("icsf_channel_status");
        if (saved) {
          channelStatus = JSON.parse(saved);
        } else {
          channelStatus = {};
        }

        // Pre-activate premium channels as works
        const premiumIds = [
          "ananda-tv", "bangla-tv", "channel-9", "duronto-tv", "boishakhi-tv",
          "t-sports", "cricket-gold", "somoy-news-tv", "jamuna-tv", "dw-news"
        ];
        let changed = false;
        premiumIds.forEach(id => {
          if (!channelStatus[id]) {
            channelStatus[id] = "works";
            changed = true;
          }
        });
        if (changed) {
          localStorage.setItem("icsf_channel_status", JSON.stringify(channelStatus));
        }
      } catch (err) {
        console.error("Cache load error:", err);
      }
    }

    function saveChannelStatus(channelId, status) {
      channelStatus[channelId] = status === "PLAYING" ? "works" : "fails";
      try {
        localStorage.setItem("icsf_channel_status", JSON.stringify(channelStatus));
      } catch (e) {}
      
      // Update specifically that grid item status if visible
      const dot = document.getElementById(`status-dot-${channelId}`);
      if (dot) {
        if (status === "PLAYING") {
          dot.innerHTML = `<span class="flex h-2 w-2 relative" title="এক্টিভ">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
            <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
          </span>`;
        } else {
          dot.innerHTML = `<span class="h-1.5 w-1.5 rounded-full bg-red-600" title="সমস্যা"></span>`;
        }
      }
    }

    // Process channel name for fallback labels (Initials)
    function getInitials(name) {
      if (!name) return "TV";
      const cleanName = name
        .replace(/\[[^\]]+\]/g, "")
        .replace(/\b(hd|sd|fhd|uhd|tv|live|uk|us|bd|in)\b/gi, "")
        .trim();

      const parts = cleanName.split(/\s+/).filter(Boolean);
      if (parts.length >= 2) {
        return (parts[0][0] + parts[1][0]).toUpperCase();
      }
      return cleanName.slice(0, 2).toUpperCase();
    }

    // Get color gradient for Channel Fallback cards based on category
    function getGradientClass(category) {
      switch (category) {
        case "Sports":
          return "from-emerald-600 to-teal-900 border-emerald-500/20 text-emerald-100";
        case "News":
          return "from-rose-700 to-red-950 border-red-500/20 text-rose-100";
        case "Entertainment":
          return "from-indigo-600 to-fuchsia-950 border-indigo-500/20 text-indigo-100";
        default:
          return "from-zinc-800 to-zinc-950 border-zinc-700/30 text-zinc-300";
      }
    }

    // Format URL with Ayna Credentials
    function getPlayableUrl(channel) {
      if (!channel) return "";
      let url = channel.url;
      if (url.includes("aynaott.com")) {
        try {
          const parsedUrl = new URL(url);
          parsedUrl.searchParams.set("u", aynaU);
          parsedUrl.searchParams.set("e", aynaE);
          url = parsedUrl.toString();
        } catch (e) {
          if (!url.includes("u=")) {
            const separator = url.includes("?") ? "&" : "?";
            url = `${url}${separator}e=${aynaE}&u=${aynaU}`;
          }
        }
      }
      return url;
    }

    // Initialize Video HLS.js Player
    function playChannel(channel) {
      if (!channel) return;
      selectedChannel = channel;
      
      // Update UI displays
      playerActiveTitle.textContent = channel.name;
      
      // Visual indicator highlighting in list
      document.querySelectorAll(".channel-card-el").forEach(card => {
        card.classList.remove("bg-white", "text-black", "border-white", "ring-1", "ring-white", "shadow-sm", "font-semibold");
        card.classList.add("border-white/5", "hover:border-white/10", "hover:bg-white/5");
        
        // Fix text colors color overrides inside cards
        const textSpan = card.querySelector(".channel-title-text");
        if (textSpan) {
          textSpan.classList.remove("text-black", "font-semibold");
          textSpan.classList.add("text-white");
        }
        
        // Frame bg reset
        const logoFrame = card.querySelector(".logo-frame-el");
        if (logoFrame) {
          logoFrame.classList.remove("bg-black", "border-transparent");
          logoFrame.classList.add("bg-black", "border-white/5");
        }
      });
      
      const activeCard = document.getElementById(`channel-card-${channel.id}`);
      if (activeCard) {
        activeCard.classList.add("bg-white", "text-black", "border-white", "ring-1", "ring-white", "shadow-sm", "font-semibold");
        activeCard.classList.remove("border-white/5", "hover:border-white/10", "hover:bg-white/5");
        
        const textSpan = activeCard.querySelector(".channel-title-text");
        if (textSpan) {
          textSpan.classList.add("text-black", "font-semibold");
          textSpan.classList.remove("text-white");
        }
        
        const logoFrame = activeCard.querySelector(".logo-frame-el");
        if (logoFrame) {
          logoFrame.classList.add("bg-black", "border-transparent");
          logoFrame.classList.remove("bg-black", "border-white/5");
        }
      }

      // Hide panels, show loading
      playerError.classList.add("hidden");
      playerLoading.classList.remove("hidden");

      const streamUrl = getPlayableUrl(channel);

      // Clean up previous Hls instance
      if (hlsInstance) {
        hlsInstance.destroy();
        hlsInstance = null;
      }

      try {
        videoElement.pause();
        videoElement.removeAttribute("src");
        videoElement.load();
      } catch (e) {}

      // Prefer Hls.js library
      if (Hls.isSupported()) {
        const hls = new Hls({
          maxMaxBufferLength: 8,
          enableWorker: true,
          lowLatencyMode: true,
          backBufferLength: 3,
          manifestLoadingTimeOut: 10000,
        });

        hlsInstance = hls;
        hls.loadSource(streamUrl);
        hls.attachMedia(videoElement);

        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          if (selectedChannel.id !== channel.id) return;
          playerLoading.classList.add("hidden");
          videoElement.play()
            .then(() => {
              updatePlayIcon(true);
              saveChannelStatus(channel.id, "PLAYING");
            })
            .catch(err => {
              console.log("Autoplay blocked:", err);
              updatePlayIcon(false);
            });
        });

        hls.on(Hls.Events.ERROR, (_, data) => {
          if (selectedChannel.id !== channel.id) return;
          if (data.fatal) {
            switch (data.type) {
              case Hls.ErrorTypes.NETWORK_ERROR:
                hls.startLoad();
                break;
              case Hls.ErrorTypes.MEDIA_ERROR:
                hls.recoverMediaError();
                break;
              default:
                showPlayerError(channel, "চ্যানেলটি বন্ধ আছে অথবা লিঙ্কটি পরিবর্তন হয়েছে।");
                saveChannelStatus(channel.id, "ERROR");
                break;
            }
          }
        });
      } 
      // Safari Native/iOS Fallback
      else if (videoElement.canPlayType("application/vnd.apple.mpegurl") || videoElement.canPlayType("application/x-mpegURL")) {
        videoElement.src = streamUrl;
        
        const onLoadedMeta = () => {
          if (selectedChannel.id !== channel.id) return;
          playerLoading.classList.add("hidden");
          videoElement.play()
            .then(() => {
              updatePlayIcon(true);
              saveChannelStatus(channel.id, "PLAYING");
            })
            .catch(e => {
              updatePlayIcon(false);
            });
          videoElement.removeEventListener("loadedmetadata", onLoadedMeta);
        };
        
        const onPlayError = () => {
          if (selectedChannel.id !== channel.id) return;
          showPlayerError(channel, "চ্যানেলটি চালু করা যাচ্ছে না। দয়া করে রিফ্রেশ করুন।");
          saveChannelStatus(channel.id, "ERROR");
          videoElement.removeEventListener("error", onPlayError);
        };

        videoElement.addEventListener("loadedmetadata", onLoadedMeta);
        videoElement.addEventListener("error", onPlayError);
      } else {
        playerLoading.classList.add("hidden");
        showPlayerError(channel, "আপনার ব্রাউজারে এই ভিডিও প্লে করা সম্ভব নয়।");
      }
    }

    function showPlayerError(channel, msg) {
      playerLoading.classList.add("hidden");
      errorChannelName.textContent = channel.name;
      errorChannelDesc.textContent = msg || "চ্যানেলটির ভিডিও লোড করা সম্ভব হচ্ছে না। লিঙ্কটি সাময়িকভাবে বন্ধ আছে।";
      playerError.classList.remove("hidden");
      updatePlayIcon(false);
    }

    function updatePlayIcon(playing) {
      if (playing) {
        playIcon.setAttribute("data-lucide", "pause");
        playIcon.className = "w-4.5 h-4.5 fill-black text-black";
      } else {
        playIcon.setAttribute("data-lucide", "play");
        playIcon.className = "w-4.5 h-4.5 fill-black text-black pl-0.5";
      }
      lucide.createIcons();
    }

    function togglePlay() {
      if (videoElement.paused) {
        videoElement.play()
          .then(() => updatePlayIcon(true))
          .catch(e => console.log("Play blocked/failed:", e));
      } else {
        videoElement.pause();
        updatePlayIcon(false);
      }
    }

    // Previous Channel trigger
    function playPrevChannel() {
      if (filteredChannels.length === 0 || !selectedChannel) return;
      let currentIndex = filteredChannels.findIndex(ch => ch.id === selectedChannel.id);
      if (currentIndex !== -1) {
        let prevIndex = (currentIndex - 1 + filteredChannels.length) % filteredChannels.length;
        playChannel(filteredChannels[prevIndex]);
      } else {
        playChannel(filteredChannels[filteredChannels.length - 1]);
      }
    }

    // Next Channel trigger
    function playNextChannel() {
      if (filteredChannels.length === 0 || !selectedChannel) return;
      let currentIndex = filteredChannels.findIndex(ch => ch.id === selectedChannel.id);
      if (currentIndex !== -1) {
        let nextIndex = (currentIndex + 1) % filteredChannels.length;
        playChannel(filteredChannels[0]);
      } else {
        playChannel(filteredChannels[0]);
      }
    }

    // Toggle True Fullscreen on Native Video Frame
    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        if (videoElement.requestFullscreen) {
          videoElement.requestFullscreen();
        } else if (videoElement.webkitRequestFullscreen) {
          videoElement.webkitRequestFullscreen();
        } else if (videoElement.msRequestFullscreen) {
          videoElement.msRequestFullscreen();
        }
      } else {
        if (document.exitFullscreen) {
          document.exitFullscreen();
        }
      }
    }

    // Render channels in the grid
    function renderChannelsGrid() {
      const displaySubset = filteredChannels.slice(0, visibleCount);
      
      if (displaySubset.length === 0) {
        noChannels.classList.remove("hidden");
        channelsGrid.classList.add("hidden");
        paginationPanel.classList.add("hidden");
        return;
      }

      noChannels.classList.add("hidden");
      channelsGrid.classList.remove("hidden");

      let html = "";
      displaySubset.forEach(ch => {
        const isSelected = selectedChannel && selectedChannel.id === ch.id;
        const gradient = getGradientClass(ch.category);
        const initials = getInitials(ch.name);
        
        let statusIndicatorHtml = "";
        if (!ch.url.startsWith("https://")) {
          statusIndicatorHtml = `<span class="text-[7.5px] bg-amber-500 text-black px-1 py-0.5 rounded-sm font-black scale-90 tracking-wider" title="HTTP Stream (Only plays if browser supports mixed content)">HTTP</span>`;
        } else if (channelStatus[ch.id] === "works") {
          statusIndicatorHtml = `<span class="flex h-2 w-2 relative" title="এক্টিভ">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
            <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
          </span>`;
        } else if (channelStatus[ch.id] === "fails") {
          statusIndicatorHtml = `<span class="h-1.5 w-1.5 rounded-full bg-red-600" title="সমস্যা"></span>`;
        }

        // Generate logo HTML
        let logoHtml = "";
        if (ch.logo && ch.logo.trim() !== "") {
          logoHtml = `<img src="${ch.logo}" class="max-h-full max-w-full object-contain transition-transform duration-300 ${isSelected ? 'brightness-110 scale-102' : 'brightness-95 opacity-85 group-hover:opacity-100'}" alt="${ch.name}" referrerPolicy="no-referrer" onerror="fallbackLogo(this, '${ch.category}', '${initials}')" />`;
        } else {
          logoHtml = `<div class="w-full h-full rounded bg-gradient-to-br ${gradient} border flex flex-col items-center justify-center relative overflow-hidden select-none">
            <div class="absolute inset-x-0 top-0 h-[1px] bg-white/10"></div>
            <div class="absolute inset-0 bg-[linear-gradient(rgba(255,255,255,0.02)_1px,transparent_1px)] bg-[size:100%_4px] pointer-events-none"></div>
            <span class="text-sm font-extrabold tracking-wider leading-none">${initials}</span>
            <span class="text-[7.5px] text-white/50 tracking-widest uppercase mt-0.5 font-semibold">${ch.category.slice(0, 4)}</span>
          </div>`;
        }

        const activeClasses = isSelected 
          ? "bg-white text-black border-white ring-1 ring-white shadow-md font-semibold" 
          : "border-white/5 hover:border-white/10 hover:bg-white/5";
        
        const titleColorClass = isSelected ? "text-black font-semibold" : "text-white";
        const logoFrameSelectedClasses = isSelected ? "bg-black border-transparent" : "bg-black border-white/5";

        html += `
          <div
            id="channel-card-${ch.id}"
            class="channel-card-el bg-zinc-900/10 border p-2.5 rounded-xl flex flex-col justify-between gap-3 transition-all duration-200 cursor-pointer relative group smooth-transition ${activeClasses}"
            onclick="selectChannelById('${ch.id}')"
          >
            <div>
              <!-- Channel Logo Frame -->
              <div class="logo-frame-el w-full h-14 rounded-lg flex items-center justify-center p-2 shrink-0 border relative ${logoFrameSelectedClasses}">
                <div class="flex items-center justify-center w-full h-full overflow-hidden">
                  ${logoHtml}
                </div>

                <!-- Status Indicator -->
                <div id="status-dot-${ch.id}" class="absolute top-1 right-1 flex items-center gap-1 z-10">
                  ${statusIndicatorHtml}
                </div>
              </div>

              <!-- Channel Title -->
              <div class="w-full mt-2 text-center">
                <span class="channel-title-text text-[11px] block truncate w-full tracking-wide ${titleColorClass}">
                  ${ch.name}
                </span>
              </div>
            </div>
          </div>
        `;
      });

      channelsGrid.innerHTML = html;

      // Handle Pagination button visibility
      if (filteredChannels.length > visibleCount) {
        paginationPanel.classList.remove("hidden");
      } else {
        paginationPanel.classList.add("hidden");
      }
    }

    // Logo image load failure fallback generator
    window.fallbackLogo = function(imgElement, category, initials) {
      const gradient = getGradientClass(category);
      const parent = imgElement.parentElement;
      if (parent) {
        parent.innerHTML = `<div class="w-full h-full rounded bg-gradient-to-br ${gradient} border flex flex-col items-center justify-center relative overflow-hidden select-none">
          <div class="absolute inset-x-0 top-0 h-[1px] bg-white/10"></div>
          <div class="absolute inset-0 bg-[linear-gradient(rgba(255,255,255,0.02)_1px,transparent_1px)] bg-[size:100%_4px] pointer-events-none"></div>
          <span class="text-sm font-extrabold tracking-wider leading-none">${initials}</span>
          <span class="text-[7.5px] text-white/50 tracking-widest uppercase mt-0.5 font-semibold">${category.slice(0, 4)}</span>
        </div>`;
      }
    };

    // User selected channel click by Card ID
    window.selectChannelById = function(id) {
      const target = sortedChannels.find(ch => ch.id === id);
      if (target) {
        playChannel(target);
        document.getElementById("player-section").scrollIntoView({ behavior: "smooth", block: "start" });
      }
    };

    // Processing channels sorting (HTTPS first) and initialization
    function initChannels() {
      const raw = (window.INITIAL_CHANNELS && window.INITIAL_CHANNELS.length > 0) ? window.INITIAL_CHANNELS : [];
      
      // Sort: HTTPS first for secure hosting environments
      sortedChannels = [...raw].sort((a, b) => {
        const isHttpsA = a.url.startsWith("https://");
        const isHttpsB = b.url.startsWith("https://");
        if (isHttpsA !== isHttpsB) {
          return isHttpsB ? 1 : -1;
        }
        return 0;
      });

      applyFilters();

      // Autoload the first channel
      if (sortedChannels.length > 0) {
        playChannel(sortedChannels[0]);
      }
    }

    // Filters: Search Keyword & Categories
    function applyFilters() {
      filteredChannels = sortedChannels.filter(ch => {
        const matchesSearch = ch.name.toLowerCase().includes(searchQuery.toLowerCase());
        let matchesCategory = false;
        if (selectedCategory === "All") {
          matchesCategory = true;
        } else {
          matchesCategory = ch.category === selectedCategory;
        }
        return matchesSearch && matchesCategory;
      });

      channelCountText.textContent = filteredChannels.length;
      renderChannelsGrid();
    }

    // App Control Listeners
    playButton.addEventListener("click", togglePlay);
    videoElement.addEventListener("click", togglePlay);
    prevButton.addEventListener("click", playPrevChannel);
    nextButton.addEventListener("click", playNextChannel);
    reloadButton.addEventListener("click", () => playChannel(selectedChannel));
    retryButton.addEventListener("click", () => playChannel(selectedChannel));
    fullscreenButton.addEventListener("click", toggleFullscreen);

    // Search Key events
    searchInput.addEventListener("input", (e) => {
      searchQuery = e.target.value.trim();
      if (searchQuery.length > 0) {
        clearSearch.classList.remove("hidden");
      } else {
        clearSearch.classList.add("hidden");
      }
      visibleCount = 120; // reset pagination
      applyFilters();
    });

    clearSearch.addEventListener("click", () => {
      searchInput.value = "";
      searchQuery = "";
      clearSearch.classList.add("hidden");
      visibleCount = 120;
      applyFilters();
    });

    // Pagination Click
    btnShowMore.addEventListener("click", () => {
      visibleCount += 120;
      renderChannelsGrid();
    });

    // Category pill filtering listeners
    categoryTabs.forEach(tab => {
      tab.addEventListener("click", () => {
        categoryTabs.forEach(t => {
          t.className = "category-tab px-3 py-1.5 rounded-lg border transition-all text-[11px] font-semibold shrink-0 cursor-pointer bg-zinc-900/30 text-zinc-400 border-white/5 hover:border-white/10 hover:text-white";
        });
        tab.className = "category-tab px-3 py-1.5 rounded-lg border transition-all text-[11px] font-semibold shrink-0 cursor-pointer bg-white text-black border-white shadow-sm";
        
        selectedCategory = tab.getAttribute("data-category");
        visibleCount = 120; // reset pagination on category filter
        applyFilters();
      });
    });

    // Keyboard Shortcuts (Arrow Left/Right to change channels)
    window.addEventListener("keydown", (e) => {
      if (document.activeElement.tagName === "INPUT" || document.activeElement.tagName === "TEXTAREA") {
        return;
      }
      if (e.key === "ArrowRight") {
        playNextChannel();
      } else if (e.key === "ArrowLeft") {
        playPrevChannel();
      }
    });

    // Initialize the Portlet App
    initStatusCache();
    initChannels();
    lucide.createIcons();

  </script>
</body>
</html>
